syntax = "proto3";

package podstack.v1;

option go_package = "github.com/podstack/serverless/api/proto/podstack/v1;podstackv1";

import "google/protobuf/timestamp.proto";

// InferenceService handles inference requests across all model types.
service InferenceService {
  // ChatCompletion sends a chat completion request (LLMs).
  rpc ChatCompletion(ChatCompletionRequest) returns (ChatCompletionResponse);

  // ChatCompletionStream sends a streaming chat completion request.
  rpc ChatCompletionStream(ChatCompletionRequest) returns (stream ChatCompletionChunk);

  // Completion sends a text completion request.
  rpc Completion(CompletionRequest) returns (CompletionResponse);

  // Embedding generates embeddings for input text.
  rpc Embedding(EmbeddingRequest) returns (EmbeddingResponse);

  // ImageGeneration generates images from text prompts.
  rpc ImageGeneration(ImageGenerationRequest) returns (ImageGenerationResponse);

  // AudioTranscription transcribes audio to text.
  rpc AudioTranscription(AudioTranscriptionRequest) returns (AudioTranscriptionResponse);

  // AudioSpeech synthesizes speech from text.
  rpc AudioSpeech(AudioSpeechRequest) returns (AudioSpeechResponse);

  // GenericInference runs inference on custom models.
  rpc GenericInference(GenericInferenceRequest) returns (GenericInferenceResponse);
}

// ChatCompletionRequest follows the OpenAI chat completion format.
message ChatCompletionRequest {
  string model = 1;
  repeated ChatMessage messages = 2;
  double temperature = 3;
  int32 max_tokens = 4;
  bool stream = 5;
  double top_p = 6;
  double frequency_penalty = 7;
  double presence_penalty = 8;
  repeated string stop = 9;
  // LoRA adapter to use (optional).
  string lora_adapter = 10;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatCompletionResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChatChoice choices = 5;
  Usage usage = 6;
}

message ChatChoice {
  int32 index = 1;
  ChatMessage message = 2;
  string finish_reason = 3;
}

message ChatCompletionChunk {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChatChunkChoice choices = 5;
}

message ChatChunkChoice {
  int32 index = 1;
  ChatChunkDelta delta = 2;
  string finish_reason = 3;
}

message ChatChunkDelta {
  string role = 1;
  string content = 2;
}

message CompletionRequest {
  string model = 1;
  string prompt = 2;
  int32 max_tokens = 3;
  double temperature = 4;
  bool stream = 5;
}

message CompletionResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated CompletionChoice choices = 5;
  Usage usage = 6;
}

message CompletionChoice {
  int32 index = 1;
  string text = 2;
  string finish_reason = 3;
}

message EmbeddingRequest {
  string model = 1;
  repeated string input = 2;
}

message EmbeddingResponse {
  string object = 1;
  string model = 2;
  repeated EmbeddingData data = 3;
  Usage usage = 4;
}

message EmbeddingData {
  int32 index = 1;
  string object = 2;
  repeated float embedding = 3;
}

message ImageGenerationRequest {
  string model = 1;
  string prompt = 2;
  int32 n = 3;
  string size = 4;
}

message ImageGenerationResponse {
  int64 created = 1;
  repeated ImageData data = 2;
}

message ImageData {
  string url = 1;
  string b64_json = 2;
}

message AudioTranscriptionRequest {
  string model = 1;
  bytes audio = 2;
  string language = 3;
}

message AudioTranscriptionResponse {
  string text = 1;
}

message AudioSpeechRequest {
  string model = 1;
  string input = 2;
  string voice = 3;
  string response_format = 4;
}

message AudioSpeechResponse {
  bytes audio = 1;
}

message GenericInferenceRequest {
  string model = 1;
  bytes input = 2;
  map<string, string> parameters = 3;
}

message GenericInferenceResponse {
  bytes output = 1;
  map<string, string> metadata = 2;
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}
