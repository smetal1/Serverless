apiVersion: v1
kind: PersistentVolume
metadata:
  name: podstack-snapshots
  labels:
    app.kubernetes.io/name: podstack
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: storage
    podstack.io/component: storage
    podstack.io/storage-type: nvme-snapshots
spec:
  capacity:
    storage: 500Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: podstack-nvme
  local:
    path: /mnt/nvme/podstack-snapshots
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: podstack.io/nvme-storage
              operator: Exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: podstack-snapshots
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: podstack
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: storage
    podstack.io/component: storage
    podstack.io/storage-type: nvme-snapshots
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: podstack-nvme
  volumeName: podstack-snapshots
  resources:
    requests:
      storage: 500Gi
