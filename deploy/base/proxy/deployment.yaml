apiVersion: apps/v1
kind: Deployment
metadata:
  name: podstack-proxy
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: podstack-proxy
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: proxy
    podstack.io/component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: podstack-proxy
      app.kubernetes.io/component: proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: podstack-proxy
        app.kubernetes.io/part-of: podstack-inference-os
        app.kubernetes.io/component: proxy
        podstack.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: podstack-operator
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: podstack/proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_CONFIG_PATH
              value: /etc/podstack/litellm-config.yaml
            - name: LITELLM_LOG_LEVEL
              value: INFO
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/podstack
              readOnly: true
      volumes:
        - name: proxy-config
          configMap:
            name: podstack-proxy-config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: podstack-proxy
      nodeSelector:
        kubernetes.io/os: linux
