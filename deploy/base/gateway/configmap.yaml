apiVersion: v1
kind: ConfigMap
metadata:
  name: podstack-gateway-config
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: podstack-gateway
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: gateway
    podstack.io/component: gateway
data:
  gateway-config.yaml: |
    # Podstack Gateway Configuration
    server:
      addr: ":8080"
      readTimeout: 30s
      writeTimeout: 120s

    # Kubernetes namespace for model resources
    namespace: podstack-system

    # Prometheus endpoint for querying GPU and model metrics
    prometheus:
      address: http://prometheus-server.monitoring.svc.cluster.local:9090

    # Request routing configuration
    routing:
      # Maximum time to wait for a cold model to become ready
      coldStartTimeout: 300s
      # Interval for polling model readiness during cold start
      coldStartPollInterval: 500ms
      # Maximum number of concurrent requests per model replica
      maxConcurrentPerReplica: 64

    # Rate limiting defaults (overridden per-tenant)
    rateLimit:
      defaultRequestsPerMinute: 60
      burstSize: 10

    # Health check configuration
    healthCheck:
      interval: 10s
      timeout: 5s
      failureThreshold: 3

    # Logging configuration
    logging:
      level: info
      format: json
