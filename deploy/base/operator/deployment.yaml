apiVersion: apps/v1
kind: Deployment
metadata:
  name: podstack-operator
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: podstack-operator
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: operator
    podstack.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: podstack-operator
      app.kubernetes.io/component: operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: podstack-operator
        app.kubernetes.io/part-of: podstack-inference-os
        app.kubernetes.io/component: operator
        podstack.io/component: operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: podstack-operator
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: podstack/operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
            - --namespace=podstack-system
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NFS_MOUNT_PATH
              value: /mnt/models
            - name: SNAPSHOT_MOUNT_PATH
              value: /mnt/snapshots
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nfs-models
              mountPath: /mnt/models
              readOnly: true
            - name: snapshots
              mountPath: /mnt/snapshots
      volumes:
        - name: nfs-models
          persistentVolumeClaim:
            claimName: podstack-nfs-models
        - name: snapshots
          persistentVolumeClaim:
            claimName: podstack-snapshots
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
