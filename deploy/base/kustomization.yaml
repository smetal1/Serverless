apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: podstack-system

commonLabels:
  app.kubernetes.io/part-of: podstack-inference-os
  app.kubernetes.io/managed-by: kustomize

resources:
  # Namespace
  - namespace.yaml

  # Custom Resource Definitions
  - crds/modeldeployment-crd.yaml
  - crds/snapshot-crd.yaml
  - crds/loraadapter-crd.yaml
  - crds/tenant-crd.yaml

  # Operator
  - operator/service-account.yaml
  - operator/rbac.yaml
  - operator/deployment.yaml

  # Gateway
  - gateway/configmap.yaml
  - gateway/deployment.yaml
  - gateway/service.yaml

  # Proxy (LiteLLM)
  - proxy/configmap.yaml
  - proxy/deployment.yaml
  - proxy/service.yaml

  # Storage
  - storage/nfs-pv.yaml
  - storage/nfs-pvc.yaml
  - storage/snapshot-pv.yaml

  # Monitoring
  - monitoring/dcgm-exporter.yaml
  - monitoring/prometheus-config.yaml
  - monitoring/service-monitor.yaml
