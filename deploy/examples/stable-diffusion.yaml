apiVersion: podstack.io/v1
kind: ModelDeployment
metadata:
  name: sdxl-turbo
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: sdxl-turbo
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: model
    podstack.io/component: worker
    podstack.io/model: sdxl-turbo
    podstack.io/runtime: triton
    podstack.io/model-type: diffusion
spec:
  modelName: stabilityai/sdxl-turbo
  modelSource: huggingface
  modelType: diffusion
  runtime: triton
  runtimeArgs:
    - --model-repository=/mnt/models/triton-repos/sdxl-turbo
    - --backend-config=python,shm-default-byte-size=1073741824
  gpu:
    count: 1
    memoryMB: 16000
    type: l40s
  scaling:
    minReplicas: 0
    maxReplicas: 4
    idleTimeoutSeconds: 180
    standbyPool: 1
  snapshot:
    enabled: true
    autoSnapshot: true
    warmupRequests: 2
