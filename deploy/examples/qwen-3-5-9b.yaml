apiVersion: podstack.io/v1
kind: ModelDeployment
metadata:
  name: qwen-3-5-9b
  namespace: serverless
  labels:
    app.kubernetes.io/name: qwen-3-5-9b
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: model
    podstack.io/component: worker
    podstack.io/model: qwen-3-5-9b
    podstack.io/runtime: vllm
    podstack.io/model-type: llm
spec:
  modelName: Qwen/Qwen3.5-9B
  modelSource: huggingface
  modelType: llm
  runtime: vllm
  runtimeArgs:
    - --max-model-len=8192
    - --dtype=auto
    - --enforce-eager=false
    - --gpu-memory-utilization=0.90
  gpu:
    count: 1
    memoryMB: 24000
    type: l40s
  scaling:
    minReplicas: 1
    maxReplicas: 2
    idleTimeoutSeconds: 300
    standbyPool: 0
  snapshot:
    enabled: false
    autoSnapshot: false
    warmupRequests: 0
  lora:
    maxAdapters: 1
    adapterRefs: []
