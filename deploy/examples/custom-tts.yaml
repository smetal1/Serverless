apiVersion: podstack.io/v1
kind: ModelDeployment
metadata:
  name: custom-tts-service
  namespace: podstack-system
  labels:
    app.kubernetes.io/name: custom-tts-service
    app.kubernetes.io/part-of: podstack-inference-os
    app.kubernetes.io/component: model
    podstack.io/component: worker
    podstack.io/model: custom-tts-service
    podstack.io/runtime: generic
    podstack.io/model-type: tts
spec:
  modelName: internal/custom-tts-v2
  modelSource: oci
  modelType: tts
  image: registry.internal.example.com/ml/custom-tts:v2.1.0
  runtime: generic
  runtimeArgs:
    - --model-path=/mnt/models/custom-tts-v2
    - --sample-rate=24000
    - --max-batch-size=8
    - --port=8000
  gpu:
    count: 1
    memoryMB: 6000
    coresPercent: 50
    type: l40s
  scaling:
    minReplicas: 0
    maxReplicas: 6
    idleTimeoutSeconds: 180
    standbyPool: 1
  snapshot:
    enabled: true
    autoSnapshot: true
    warmupRequests: 3
